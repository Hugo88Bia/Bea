<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bea's Craft World</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');

  :root {
    --pink: #FF6B9D;
    --purple: #9B59B6;
    --teal: #1ABC9C;
    --yellow: #F1C40F;
    --orange: #FF8C42;
    --blue: #3498DB;
    --light-bg: #FFF9FE;
    --card-bg: #FFFFFF;
    --text: #2C2C54;
    --muted: #888;
    --radius: 18px;
    --shadow: 0 4px 20px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--light-bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(155,89,182,0.3);
  }
  .header-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: white;
    letter-spacing: 0.5px;
  }
  .streak-badge {
    background: rgba(255,255,255,0.25);
    border-radius: 30px;
    padding: 6px 14px;
    color: white;
    font-weight: 800;
    font-size: 0.9rem;
    display: flex; align-items: center; gap: 5px;
  }

  /* ── LEVEL BAR ── */
  .level-bar-wrap {
    background: linear-gradient(135deg, #f8e8ff, #e8f4ff);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .level-label {
    font-weight: 800; color: var(--purple); font-size: 0.85rem; white-space: nowrap;
  }
  .xp-bar-outer {
    flex: 1; height: 12px; background: #ddd; border-radius: 10px; overflow: hidden;
  }
  .xp-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--blue));
    border-radius: 10px;
    transition: width 0.5s ease;
  }
  .xp-label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

  /* ── SCREENS ── */
  .screen { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ── HOME ── */
  .welcome-msg {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--purple);
    margin: 10px 0 6px;
  }
  .welcome-sub { text-align: center; color: var(--muted); font-size: 0.95rem; margin-bottom: 20px; }

  .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .subject-card {
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow);
    color: white;
    user-select: none;
  }
  .subject-card:active { transform: scale(0.96); }
  .subject-card .icon { font-size: 2.2rem; margin-bottom: 6px; }
  .subject-card .name { font-weight: 800; font-size: 1rem; }
  .subject-card .count { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }
  .card-maths { background: linear-gradient(135deg, #FF6B9D, #FF8C42); }
  .card-spelling { background: linear-gradient(135deg, #9B59B6, #3498DB); }
  .card-geography { background: linear-gradient(135deg, #1ABC9C, #3498DB); }
  .card-science { background: linear-gradient(135deg, #F1C40F, #FF8C42); }

  .crafts-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--pink), var(--orange));
    border: none; border-radius: var(--radius);
    color: white; font-family: 'Fredoka One', cursive;
    font-size: 1.3rem; cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
    margin-bottom: 14px;
  }
  .crafts-btn:active { transform: scale(0.97); }

  .stats-row {
    display: flex; gap: 10px;
  }
  .stat-card {
    flex: 1; background: var(--card-bg); border-radius: var(--radius);
    padding: 14px 10px; text-align: center; box-shadow: var(--shadow);
  }
  .stat-card .stat-val { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: var(--purple); }
  .stat-card .stat-lbl { font-size: 0.72rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── QUIZ ── */
  .quiz-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .back-btn {
    background: white; border: none; border-radius: 50%;
    width: 38px; height: 38px; font-size: 1.2rem;
    cursor: pointer; box-shadow: var(--shadow); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .quiz-subject-label {
    font-weight: 800; font-size: 1rem; color: var(--purple);
  }
  .progress-outer {
    flex: 1; height: 8px; background: #eee; border-radius: 10px; overflow: hidden;
  }
  .progress-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .question-card {
    background: var(--card-bg); border-radius: var(--radius);
    padding: 22px 20px; margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .question-num { font-size: 0.78rem; color: var(--muted); font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
  .question-text { font-size: 1.1rem; font-weight: 700; line-height: 1.4; }

  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: white; border: 2.5px solid #E8E8E8;
    border-radius: 14px; padding: 14px 18px;
    font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700;
    text-align: left; cursor: pointer; transition: all 0.15s;
    color: var(--text);
  }
  .option-btn:active { transform: scale(0.98); }
  .option-btn.correct { background: #D5F5E3; border-color: #27AE60; color: #1E8449; }
  .option-btn.wrong { background: #FADBD8; border-color: #E74C3C; color: #C0392B; }
  .option-btn.disabled { pointer-events: none; }

  .feedback-msg {
    text-align: center; padding: 14px;
    font-weight: 800; font-size: 1.1rem; border-radius: var(--radius);
    margin-bottom: 14px; display: none;
  }
  .feedback-msg.correct { background: #D5F5E3; color: #1E8449; }
  .feedback-msg.wrong { background: #FADBD8; color: #C0392B; }

  .next-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none; border-radius: var(--radius);
    color: white; font-family: 'Fredoka One', cursive;
    font-size: 1.2rem; cursor: pointer; display: none;
    box-shadow: var(--shadow);
  }

  /* ── RESULTS ── */
  .results-card {
    background: var(--card-bg); border-radius: var(--radius);
    padding: 28px 20px; text-align: center; box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .results-emoji { font-size: 3.5rem; margin-bottom: 10px; }
  .results-title { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: var(--purple); margin-bottom: 6px; }
  .results-score { font-size: 1rem; color: var(--muted); margin-bottom: 16px; }
  .xp-gained { background: linear-gradient(135deg, var(--teal), var(--blue)); color: white;
    border-radius: 30px; padding: 8px 20px; display: inline-block; font-weight: 800; font-size: 1rem; margin-bottom: 16px; }
  .results-actions { display: flex; gap: 10px; }
  .results-actions button {
    flex: 1; padding: 14px; border: none; border-radius: 14px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem;
    cursor: pointer;
  }
  .btn-again { background: var(--yellow); color: var(--text); }
  .btn-home { background: var(--purple); color: white; }

  /* ── COUNTRIES / CRAFTS ── */
  .section-title {
    font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: var(--purple);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .countries-grid { display: flex; flex-direction: column; gap: 12px; }
  .country-card {
    background: var(--card-bg); border-radius: var(--radius);
    padding: 16px 18px; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: transform 0.15s;
    border: 2.5px solid transparent;
  }
  .country-card:active { transform: scale(0.98); }
  .country-card.locked { opacity: 0.5; cursor: default; }
  .country-card.locked:active { transform: none; }
  .country-card.unlocked { border-color: var(--teal); }
  .country-flag { font-size: 2rem; flex-shrink: 0; }
  .country-info { flex: 1; }
  .country-name { font-weight: 800; font-size: 1rem; }
  .country-status { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .country-lock { font-size: 1.3rem; flex-shrink: 0; }

  /* ── CRAFT TUTORIAL ── */
  .craft-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .craft-title { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--purple); }

  .craft-materials {
    background: #FFF3CD; border-radius: var(--radius);
    padding: 16px 18px; margin-bottom: 16px;
    border-left: 4px solid var(--yellow);
  }
  .craft-materials h3 { font-weight: 800; margin-bottom: 8px; color: var(--orange); font-size: 0.95rem; }
  .craft-materials ul { padding-left: 18px; }
  .craft-materials li { font-size: 0.9rem; margin-bottom: 4px; font-weight: 600; }

  .craft-steps { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
  .craft-step {
    background: var(--card-bg); border-radius: var(--radius);
    padding: 16px 18px; box-shadow: var(--shadow);
    display: flex; gap: 14px; align-items: flex-start;
    border-left: 4px solid var(--pink);
    opacity: 0.45; transition: opacity 0.3s;
  }
  .craft-step.active { opacity: 1; border-left-color: var(--purple); }
  .craft-step.done { opacity: 1; border-left-color: var(--teal); background: #f0fff8; }
  .step-num {
    background: var(--purple); color: white;
    border-radius: 50%; width: 30px; height: 30px; min-width: 30px;
    font-weight: 900; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
  }
  .craft-step.done .step-num { background: var(--teal); }
  .step-text { font-size: 0.95rem; font-weight: 600; line-height: 1.5; padding-top: 3px; }

  .craft-step-nav {
    display: flex; gap: 10px; margin-bottom: 16px;
  }
  .craft-step-nav button {
    flex: 1; padding: 14px; border: none; border-radius: 14px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem;
    cursor: pointer;
  }
  .btn-prev-step { background: #eee; color: var(--text); }
  .btn-next-step { background: linear-gradient(135deg, var(--purple), var(--pink)); color: white; }
  .btn-done-craft { background: linear-gradient(135deg, var(--teal), var(--blue)); color: white; width: 100%; padding: 16px;
    border: none; border-radius: var(--radius); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.1rem; cursor: pointer; display: none; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: white; padding: 12px 24px;
    border-radius: 30px; font-weight: 700; font-size: 0.95rem;
    z-index: 999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* ── UNLOCK MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: white; border-radius: 24px; padding: 28px 22px;
    text-align: center; max-width: 340px; width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }
  .modal-emoji { font-size: 3rem; margin-bottom: 10px; }
  .modal-title { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: var(--purple); margin-bottom: 8px; }
  .modal-text { font-size: 0.95rem; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
  .modal-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none; border-radius: 14px; color: white;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem; cursor: pointer;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">🎨 Bea's World</div>
  <div class="streak-badge" id="streakBadge">🔥 0 days</div>
</div>

<!-- LEVEL BAR -->
<div class="level-bar-wrap">
  <div class="level-label" id="levelLabel">⭐ Level 1</div>
  <div class="xp-bar-outer">
    <div class="xp-bar-inner" id="xpBar" style="width:0%"></div>
  </div>
  <div class="xp-label" id="xpLabel">0 / 100 XP</div>
</div>

<!-- ══ HOME ══ -->
<div class="screen active" id="screenHome">
  <div class="welcome-msg" id="welcomeMsg">Hello, Bea! 👋</div>
  <div class="welcome-sub">What would you like to do today?</div>

  <div class="subject-grid">
    <div class="subject-card card-maths" onclick="startQuiz('maths')">
      <div class="icon">🔢</div>
      <div class="name">Maths</div>
      <div class="count" id="mathsCount"></div>
    </div>
    <div class="subject-card card-spelling" onclick="startQuiz('spelling')">
      <div class="icon">📝</div>
      <div class="name">Spelling</div>
      <div class="count" id="spellingCount"></div>
    </div>
    <div class="subject-card card-geography" onclick="startQuiz('geography')">
      <div class="icon">🌍</div>
      <div class="name">Geography</div>
      <div class="count" id="geographyCount"></div>
    </div>
    <div class="subject-card card-science" onclick="startQuiz('science')">
      <div class="icon">🔬</div>
      <div class="name">Science</div>
      <div class="count" id="scienceCount"></div>
    </div>
  </div>

  <button class="crafts-btn" onclick="showCountries()">🎨 Craft World — Explore Countries!</button>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-lbl">Questions Answered</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statCorrect">0</div>
      <div class="stat-lbl">Correct</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statCrafts">0</div>
      <div class="stat-lbl">Crafts Done</div>
    </div>
  </div>
</div>

<!-- ══ QUIZ ══ -->
<div class="screen" id="screenQuiz">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="quiz-subject-label" id="quizSubjectLabel"></span>
    <div class="progress-outer">
      <div class="progress-inner" id="quizProgress" style="width:0%"></div>
    </div>
    <span style="font-size:0.8rem;color:var(--muted);white-space:nowrap;" id="quizCounter">0/10</span>
  </div>

  <div class="question-card">
    <div class="question-num" id="questionNum"></div>
    <div class="question-text" id="questionText"></div>
  </div>

  <div class="options-list" id="optionsList"></div>

  <div class="feedback-msg" id="feedbackMsg"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
</div>

<!-- ══ RESULTS ══ -->
<div class="screen" id="screenResults">
  <div class="results-card">
    <div class="results-emoji" id="resultsEmoji"></div>
    <div class="results-title" id="resultsTitle"></div>
    <div class="results-score" id="resultsScore"></div>
    <div class="xp-gained" id="xpGained"></div>
  </div>
  <div class="results-actions">
    <button class="btn-again" onclick="playAgain()">🔄 Play Again</button>
    <button class="btn-home" onclick="goHome()">🏠 Home</button>
  </div>
</div>

<!-- ══ COUNTRIES ══ -->
<div class="screen" id="screenCountries">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="section-title" style="margin:0">🌍 Craft World</span>
  </div>
  <p style="color:var(--muted);font-size:0.9rem;margin-bottom:16px;">Answer quiz questions to unlock countries and their crafts!</p>
  <div class="countries-grid" id="countriesGrid"></div>
</div>

<!-- ══ CRAFT TUTORIAL ══ -->
<div class="screen" id="screenCraft">
  <div class="craft-header">
    <button class="back-btn" onclick="showCountries()">←</button>
    <div>
      <div class="craft-title" id="craftTitle"></div>
      <div style="font-size:0.8rem;color:var(--muted)" id="craftCountry"></div>
    </div>
  </div>

  <div class="craft-materials" id="craftMaterials"></div>

  <div class="craft-steps" id="craftSteps"></div>

  <div class="craft-step-nav" id="craftNav">
    <button class="btn-prev-step" onclick="prevStep()">← Back</button>
    <button class="btn-next-step" onclick="nextStep()">Next Step →</button>
  </div>

  <button class="btn-done-craft" id="btnDoneCraft" onclick="completeCraft()">🎉 I Finished It!</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- UNLOCK MODAL -->
<div class="modal-overlay" id="unlockModal">
  <div class="modal-box">
    <div class="modal-emoji" id="modalEmoji"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-text" id="modalText"></div>
    <button class="modal-btn" onclick="closeModal()">Let's Make It! 🎨</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════

const QUESTIONS = {

const KEY = 'beaWorld_v3';
let state;

function defaultState() {
  return {
    xp: 0,
    level: 1,
    totalAnswered: 0,
    totalCorrect: 0,
    craftsCompleted: [],
    countriesUnlocked: [],
    streak: 0,
    lastPlayDate: null,
    history: { maths: [], spelling: [], geography: [], science: [] }
  };
}

function loadState() {
  try {
    const saved = localStorage.getItem(KEY);
    state = saved ? JSON.parse(saved) : defaultState();
    if (!state.history) state.history = { maths: [], spelling: [], geography: [], science: [] };
  } catch(e) { state = defaultState(); }
  checkStreak();
}

function saveState() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}

function checkStreak() {
  const today = new Date().toDateString();
  if (!state.lastPlayDate) return;
  const last = new Date(state.lastPlayDate);
  const diff = (new Date() - last) / (1000 * 60 * 60 * 24);
  if (diff > 2) { state.streak = 0; saveState(); }
}

function markPlayedToday() {
  const today = new Date().toDateString();
  if (state.lastPlayDate !== today) {
    if (state.lastPlayDate) {
      const last = new Date(state.lastPlayDate);
      const diff = (new Date(today) - last) / (1000 * 60 * 60 * 24);
      if (diff <= 2) state.streak++;
      else state.streak = 1;
    } else {
      state.streak = 1;
    }
    state.lastPlayDate = today;
    saveState();
  }
}

// XP & Level
const XP_PER_LEVEL = [0, 100, 250, 450, 700, 1000, 1400, 1900, 2500, 3200, 4000];
function getLevel(xp) {
  let lv = 1;
  for (let i = 1; i < XP_PER_LEVEL.length; i++) {
    if (xp >= XP_PER_LEVEL[i]) lv = i + 1;
    else break;
  }
  return Math.min(lv, 10);
}
function getLevelThresholds(lv) {
  const cur = XP_PER_LEVEL[lv - 1] || 0;
  const nxt = XP_PER_LEVEL[lv] || XP_PER_LEVEL[XP_PER_LEVEL.length - 1];
  return { cur, nxt };
}

function updateLevelBar() {
  const lv = getLevel(state.xp);
  const { cur, nxt } = getLevelThresholds(lv);
  const pct = lv >= 10 ? 100 : Math.round(((state.xp - cur) / (nxt - cur)) * 100);
  document.getElementById('levelLabel').textContent = `⭐ Level ${lv}`;
  document.getElementById('xpBar').style.width = pct + '%';
  document.getElementById('xpLabel').textContent = `${state.xp} / ${nxt} XP`;
  document.getElementById('streakBadge').textContent = `🔥 ${state.streak} day${state.streak !== 1 ? 's' : ''}`;
}

function updateHome() {
  const subjectNames = ['maths','spelling','geography','science'];
  subjectNames.forEach(s => {
    const el = document.getElementById(s + 'Count');
    if (el) el.textContent = `${QUESTIONS[s].length} questions`;
  });
  document.getElementById('statTotal').textContent = state.totalAnswered;
  document.getElementById('statCorrect').textContent = state.totalCorrect;
  document.getElementById('statCrafts').textContent = state.craftsCompleted.length;
}

// QUIZ
// ══════════════════════════════════════════════════

let currentSubject = '';
let quizQuestions = [];
let currentQIndex = 0;
let correctCount = 0;
let answered = false;

function getSmartQuestions(subject, count) {
  const pool = QUESTIONS[subject];
  const history = state.history[subject] || [];
  // Prefer questions not recently asked
  const recent = new Set(history.slice(-30));
  let fresh = pool.filter((_,i) => !recent.has(i));
  if (fresh.length < count) fresh = pool;
  // Shuffle and pick
  const shuffled = [...Array(pool.length).keys()].filter(i => fresh === pool || !recent.has(i));
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const picked = shuffled.slice(0, count);
  // Update history
  state.history[subject] = [...history, ...picked].slice(-50);
  return picked.map(i => ({ ...pool[i], idx: i }));
}

function startQuiz(subject) {
  currentSubject = subject;
  const labels = { maths: '🔢 Maths', spelling: '📝 Spelling', geography: '🌍 Geography', science: '🔬 Science' };
  document.getElementById('quizSubjectLabel').textContent = labels[subject];

  quizQuestions = getSmartQuestions(subject, 10);
  currentQIndex = 0;
  correctCount = 0;
  markPlayedToday();
  showScreen('screenQuiz');
  renderQuestion();
}

function renderQuestion() {
  const q = quizQuestions[currentQIndex];
  const total = quizQuestions.length;
  answered = false;

  document.getElementById('questionNum').textContent = `Question ${currentQIndex + 1} of ${total}`;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('quizProgress').style.width = (currentQIndex / total * 100) + '%';
  document.getElementById('quizCounter').textContent = `${currentQIndex}/${total}`;
  document.getElementById('feedbackMsg').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, q.a, btn);
    list.appendChild(btn);
  });
}

function selectAnswer(chosen, correct, btn) {
  if (answered) return;
  answered = true;
  state.totalAnswered++;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.classList.add('disabled'));
  allBtns[correct].classList.add('correct');

  const fb = document.getElementById('feedbackMsg');
  fb.style.display = 'block';

  if (chosen === correct) {
    correctCount++;
    state.totalCorrect++;
    btn.classList.add('correct');
    fb.className = 'feedback-msg correct';
    fb.textContent = ['⭐ Brilliant!','🎉 Correct!','🌟 Amazing!','✅ That\'s right!','🔥 Correct!'][Math.floor(Math.random()*5)];
    // Check for new country unlock
    checkCountryUnlock();
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback-msg wrong';
    fb.textContent = `❌ Not quite — the answer is "${quizQuestions[currentQIndex].opts[correct]}"`;
  }

  document.getElementById('nextBtn').style.display = 'block';
  saveState();
}

function checkCountryUnlock() {
  const score = state.totalCorrect;
  COUNTRIES.forEach(c => {
    if (score >= c.unlock && !state.countriesUnlocked.includes(c.name)) {
      state.countriesUnlocked.push(c.name);
      setTimeout(() => showUnlockModal(c), 800);
    }
  });
}

function nextQuestion() {
  currentQIndex++;
  if (currentQIndex >= quizQuestions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  const total = quizQuestions.length;
  const pct = Math.round(correctCount / total * 100);
  const xpGain = Math.round(correctCount * 10 + (pct === 100 ? 30 : 0));
  state.xp += xpGain;
  const oldLevel = state.level;
  state.level = getLevel(state.xp);
  saveState();

  let emoji = '😊';
  let title = 'Good try!';
  if (pct === 100) { emoji = '🏆'; title = 'Perfect Score!'; }
  else if (pct >= 80) { emoji = '🌟'; title = 'Brilliant!'; }
  else if (pct >= 60) { emoji = '👍'; title = 'Well done!'; }

  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsScore').textContent = `You got ${correctCount} out of ${total} correct (${pct}%)`;
  document.getElementById('xpGained').textContent = `+${xpGain} XP earned!`;

  if (state.level > oldLevel) {
    showToast(`🎉 Level Up! You're now Level ${state.level}!`);
  }

  updateLevelBar();
  showScreen('screenResults');
}

function playAgain() { startQuiz(currentSubject); }

function showCountries() {
  const grid = document.getElementById('countriesGrid');
  grid.innerHTML = '';
  COUNTRIES.forEach(c => {
    const unlocked = state.countriesUnlocked.includes(c.name);
    const done = state.craftsCompleted.includes(c.name);
    const div = document.createElement('div');
    div.className = 'country-card ' + (unlocked ? 'unlocked' : 'locked');
    div.innerHTML = `
      <div class="country-flag">${c.flag}</div>
      <div class="country-info">
        <div class="country-name">${c.name}</div>
        <div class="country-status">${unlocked ? (done ? '✅ Craft completed!' : `🎨 ${c.craft} — tap to start!`) : `🔒 Unlock at ${c.unlock} correct answers (you have ${state.totalCorrect})`}</div>
      </div>
      <div class="country-lock">${unlocked ? (done ? '✅' : '🎨') : '🔒'}</div>
    `;
    if (unlocked) div.onclick = () => openCraft(c);
    grid.appendChild(div);
  });
  showScreen('screenCountries');
}

let currentCraft = null;
let currentStep = 0;

function openCraft(country) {
  currentCraft = country;
  currentStep = 0;

  document.getElementById('craftTitle').textContent = `${country.flag} ${country.craft}`;
  document.getElementById('craftCountry').textContent = `${country.name} — ${country.description}`;

  // Materials
  const matDiv = document.getElementById('craftMaterials');
  matDiv.innerHTML = `<h3>🧰 You'll Need:</h3><ul>${country.materials.map(m => `<li>${m}</li>`).join('')}</ul>`;

  // Steps
  const stepsDiv = document.getElementById('craftSteps');
  stepsDiv.innerHTML = '';
  country.steps.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'craft-step' + (i === 0 ? ' active' : '');
    div.id = `step_${i}`;
    div.innerHTML = `<div class="step-num">${i + 1}</div><div class="step-text">${s}</div>`;
    stepsDiv.appendChild(div);
  });

  renderCraftNav();
  showScreen('screenCraft');
}

function renderCraftNav() {
  const total = currentCraft.steps.length;
  const nav = document.getElementById('craftNav');
  const doneBtn = document.getElementById('btnDoneCraft');

  if (currentStep >= total - 1) {
    nav.style.display = 'none';
    doneBtn.style.display = 'block';
  } else {
    nav.style.display = 'flex';
    doneBtn.style.display = 'none';
    const prevBtn = nav.querySelector('.btn-prev-step');
    prevBtn.style.opacity = currentStep === 0 ? '0.4' : '1';
    prevBtn.style.pointerEvents = currentStep === 0 ? 'none' : '';
  }
}

function nextStep() {
  const total = currentCraft.steps.length;
  if (currentStep < total - 1) {
    document.getElementById(`step_${currentStep}`).classList.remove('active');
    document.getElementById(`step_${currentStep}`).classList.add('done');
    currentStep++;
    document.getElementById(`step_${currentStep}`).classList.add('active');
    document.getElementById(`step_${currentStep}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    renderCraftNav();
  }
}

function prevStep() {
  if (currentStep > 0) {
    document.getElementById(`step_${currentStep}`).classList.remove('active');
    currentStep--;
    document.getElementById(`step_${currentStep}`).classList.remove('done');
    document.getElementById(`step_${currentStep}`).classList.add('active');
    document.getElementById(`step_${currentStep}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    renderCraftNav();
  }
}

function completeCraft() {
  if (!state.craftsCompleted.includes(currentCraft.name)) {
    state.craftsCompleted.push(currentCraft.name);
    state.xp += 50;
    state.level = getLevel(state.xp);
    saveState();
    updateLevelBar();
    showToast('🎉 +50 XP — Craft completed!');
  }
  showCountries();
}

// ══════════════════════════════════════════════════
// UNLOCK MODAL
// ══════════════════════════════════════════════════

function showUnlockModal(country) {
  document.getElementById('modalEmoji').textContent = country.flag;
  document.getElementById('modalTitle').textContent = `${country.name} Unlocked!`;
  document.getElementById('modalText').textContent = `Amazing work! You've unlocked ${country.name}. Head to Craft World to make a ${country.craft}!`;
  document.getElementById('unlockModal').classList.add('show');
}
function closeModal() {
  document.getElementById('unlockModal').classList.remove('show');
}

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  updateLevelBar();
  updateHome();
  showScreen('screenHome');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════

loadState();
updateLevelBar();
updateHome();
</script>
